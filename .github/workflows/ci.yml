name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  repo-check:
    name: Repository structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify project structure
        run: |
          echo "Checking required directories..."
          for dir in backend frontend backend/app backend/ml backend/tests; do
            if [ ! -d "$dir" ]; then
              echo "FAIL: missing directory $dir"
              exit 1
            fi
            echo "OK: $dir"
          done
          echo "Project structure is valid."

  backend-lint:
    name: Backend lint
    runs-on: ubuntu-latest
    needs: repo-check
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: backend
        run: |
          if [ -s requirements.txt ]; then
            uv pip install --system -r requirements.txt
            uv pip install --system ruff
            echo "deps_installed=true" >> "$GITHUB_ENV"
          else
            echo "requirements.txt is empty, skipping dependency install"
            uv pip install --system ruff
            echo "deps_installed=false" >> "$GITHUB_ENV"
          fi

      - name: Lint with Ruff
        working-directory: backend
        run: |
          py_files=$(find . -name "*.py" -size +0 2>/dev/null)
          if [ -n "$py_files" ]; then
            ruff check .
            ruff format --check .
          else
            echo "No non-empty Python files found, skipping lint"
          fi

  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest
    needs: repo-check
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: frontend
        run: |
          if [ -s package.json ]; then
            pnpm install --frozen-lockfile || pnpm install
            echo "deps_installed=true" >> "$GITHUB_ENV"
          else
            echo "package.json is empty, skipping dependency install"
            echo "deps_installed=false" >> "$GITHUB_ENV"
          fi

      - name: Lint with Biome
        working-directory: frontend
        run: |
          if [ "$deps_installed" = "true" ]; then
            pnpm biome check .
          else
            echo "Dependencies not installed, skipping lint"
          fi

      - name: Type check
        working-directory: frontend
        run: |
          if [ "$deps_installed" = "true" ]; then
            pnpm tsc --noEmit
          else
            echo "Dependencies not installed, skipping type check"
          fi

  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        working-directory: backend
        run: |
          if [ -s requirements.txt ]; then
            uv pip install --system -r requirements.txt
            uv pip install --system pytest pytest-asyncio
            echo "deps_installed=true" >> "$GITHUB_ENV"
          else
            echo "requirements.txt is empty, skipping dependency install"
            echo "deps_installed=false" >> "$GITHUB_ENV"
          fi

      - name: Run tests
        working-directory: backend
        run: |
          if [ "$deps_installed" = "true" ]; then
            pytest
          else
            echo "Dependencies not installed, skipping tests"
          fi
